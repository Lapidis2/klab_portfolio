<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog Details | KLAB</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/blog-single.css" />
</head>
<body class="blog-single-page">
  <header class="navbar">
    <div class="wrap nav-row">
      <a href="../index.html#home" class="brand">Peter<span></span></a>
      <button class="menu-btn" type="button" aria-label="Open menu"><i class="fa-solid fa-bars"></i></button>
      <nav class="nav-links">
        <a href="../index.html#home">Home</a>
        <a href="../index.html#about">About</a>
        <a href="../index.html#projects">Projects</a>
        <a class="active" href="../index.html#blogs">Blogs</a>
        <a href="../index.html#contact">Contact</a>
      </nav>
      <button class="sun-btn" type="button" aria-label="Theme toggle"><i class="fa-regular fa-sun"></i></button>
    </div>
  </header>

  <main class="blog-single-main">
    <div class="blog-single-header">
      <h1>Blog Details</h1>
    </div>
    <div class="blog-single-toolbar">
      <a class="btn-github" href="https://github.com" target="_blank" rel="noopener noreferrer">Github</a>
    </div>

    <article class="blog-single-article">
      <h2 id="blog-title">My Programming jounery</h2>
      <div class="blog-single-cover">
        <img id="blog-cover" src="../assets/figma/blog-1.png" alt="" width="892" height="367" />
      </div>
      <p class="blog-single-body" id="blog-body"></p>

      <div class="blog-single-engagement" aria-label="Engagement">
        <div class="blog-single-stat">
          <span class="num" id="stat-comments">3</span>
          <i class="fa-regular fa-comment-dots" aria-hidden="true"></i>
        </div>
        <div class="blog-single-stat">
          <span class="num" id="stat-likes">2</span>
          <i class="fa-solid fa-heart" aria-hidden="true"></i>
        </div>
      </div>
    </article>

    <div class="blog-single-back">
      <a href="../index.html#blogs" aria-label="Back to blogs">
        <i class="fa-solid fa-arrow-left"></i>
      </a>
    </div>
  </main>

  <footer class="footer">© 2026 Hitayezu Jean Pierre. Crafted with passion and precision.</footer>

  <script src="../js/blog-single.js"></script>
  <script src="../js/script.js"></script>
</body>
</html>
